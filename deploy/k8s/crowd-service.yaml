apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowd-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crowd-service
  template:
    metadata:
      labels:
        app: crowd-service
    spec:
      containers:
      - name: crowd-service
        image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/crowdflow-repo/crowd-service:latest
        ports:
        - containerPort: 4001
        - containerPort: 4002
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: url
---
apiVersion: v1
kind: Service
metadata:
  name: crowd-service
spec:
  selector:
    app: crowd-service
  ports:
    - name: api
      protocol: TCP
      port: 4001
      targetPort: 4001
    - name: ws
      protocol: TCP
      port: 4002
      targetPort: 4002
  type: LoadBalancer
