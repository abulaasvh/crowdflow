apiVersion: apps/v1
kind: Deployment
metadata:
  name: navigation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: navigation-service
  template:
    metadata:
      labels:
        app: navigation-service
    spec:
      containers:
      - name: navigation-service
        image: us-central1-docker.pkg.dev/unified-parser-493312-d0/crowdflow-repo/navigation-service:latest
        ports:
        - containerPort: 4004
---
apiVersion: v1
kind: Service
metadata:
  name: navigation-service
spec:
  selector:
    app: navigation-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4004
  type: ClusterIP
