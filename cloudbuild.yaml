steps:
  # 1. Build auth-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/auth-service:latest', '-f', 'services/auth-service/Dockerfile', '.']
  
  # 2. Build crowd-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/crowd-service:latest', '-f', 'services/crowd-service/Dockerfile', '.']

  # 3. Build order-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/order-service:latest', '-f', 'services/order-service/Dockerfile', '.']

  # 4. Build navigation-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/navigation-service:latest', '-f', 'services/navigation-service/Dockerfile', '.']

  # 5. Build notification-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/notification-service:latest', '-f', 'services/notification-service/Dockerfile', '.']

  # 6. Build staff-web
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/staff-web:latest', '-f', 'apps/staff-web/Dockerfile', '.']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/auth-service:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/crowd-service:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/order-service:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/navigation-service:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/notification-service:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crowdflow-repo/staff-web:latest'
